# ============================================================
# 缠论分型交易系统 — 主配置
# 密钥不放这里，放 .env（TELEGRAM_BOT_TOKEN / BINANCE_API_KEY 等）
# Web 配置页修改的参数会写入 SQLite settings 表并热生效，
# settings 表里的值优先于本文件。
# ============================================================

mode: paper            # paper=模拟盘(验证模式是否赚钱) / live=真实下单
trade_direction: both  # both=多空都做 / long=只做多 / short=只做空(只对该方向信号开仓/推送)
strategy: chan_bi      # chan_bi=缠论笔+停顿K(当前) / spring_v4=破位+底分型 / chan_v1=旧
timeframes: ["5m", "15m", "1h"]   # 5m自身;15m结构用5m停顿触发;1h结构用15m停顿触发

# ---- 缠论笔策略 ----
chan:
  bi_min_bars: 5         # 一笔至少N根合并K(去包含后)
  stall_max_gap: 3       # 底/顶分型后N根内出现停顿K才确认
  mtf_tol_pct: 0.6       # 多级别:次级停顿与高级别分型的价位容差%
  fractal_vol_ma: 10     # 量能规则:底分型前2根均量回看根数
  fractal_vol_mult: 2.0  # 量能规则:底分型前2根任意一根量≥N×均量(只认最强/标准分型)
  require_divergence: true  # 一买/一卖必须背驰(离开段b比进入段a弱 或 MACD柱缩减,任一)
  macd_fast: 12          # 背驰用 MACD 快线
  macd_slow: 26          # 背驰用 MACD 慢线
  macd_signal: 9         # 背驰用 MACD 信号线
  strong_reversal_15m: false  # 仅15m强反转(过严,7天40币只过3次,已关→15m回到与5m同样标准闸)
  reversal_body_ratio: 0.6    # 强反转:右K实体≥自身振幅×该比例
  trend_reversal_alert: true  # ④趋势反转提示(更低高点+破前低/更高低点+破前高), 只提示不开仓
  hs_top_alert: true     # 头肩顶提示(左肩-头-右肩+跌破颈线), 只提示不开仓
  hs_shoulder_tol_pct: 8.0    # 头肩顶两肩高度容差%
  trend_filter: true     # ⑤顺势过滤: 上升趋势禁做空、下降趋势禁做多(震荡放行)
  trend_ma: 20           # 趋势判定均线周期
  trend_lookback: 10     # 均线斜率回看根数
  trend_slope_pct: 0.3   # 斜率阈值%(MA近lookback根涨跌超过此值=趋势, 内=震荡)

# ---- 威科夫弹簧买点(Spring/UTAD) 独立路径 ----
wyckoff:
  enabled: true
  confirm_only: false    # false=威科夫独立开仓(回测7/14天期望稳定+0.23); true=仅提示不开仓
  require_divergence: false  # (已去掉背驰收紧)
  dryup_only: false      # (已去掉"只缩量"收紧)
  vol_mult: 3.0          # 扫破前低那根下跌K量能 ≥ 前20根均量×3 才算(放量假突破)
  lookback: 20           # 前低/前高回看根数(确定支撑/阻力)
  reclaim_bars: 4        # 扫破后N根内收回才算弹簧
  pierce_tol_pct: 0.0    # 扫破容差%(0=只要破)
  vol_ma: 20             # 扫破K量能参照均线
  climax_mult: 2.0       # 放量弹簧门槛(扫破K量≥N×均量)
  dryup_ratio: 1.0       # 缩量弹簧门槛(扫破K量<N×均量=供给枯竭,最强)
  min_bounce_pct: 1.5    # 前低形成后须反弹离开≥N%(确保回探支撑,非下跌途中)
  wick_min: 0.0          # 扫破K反向影线门槛(0=关:放量下跌阴线常收低位无下影,与放量假突破冲突)
  cooldown_bars: 10      # 同币同级别同向N根内只出一次弹簧(防洪水)
  overlap_bars: 3        # 双信号重叠时间窗(根):缠论买点+威科夫买点同位共振

# ---- 策略V4: 放量破位 → 底分型收回破位K顶部 ----
spring:
  vol_mult: 4.0            # 破位K量 >= N×前20根均量
  newlow_lookback: 20      # 破位=创近N根新低(做空看新高)
  body_min: 0.5            # 破位K实体占比下限
  fractal_window: 8        # 破位后N根内须出底分型(收回破位K顶部)，否则作废
  buy2_window: 60          # 一买后N根内跟踪二买
  maink_range_atr: 1.2     # 主力K振幅 >= N×ATR(可选标注)
  tp_lookback: 100         # 止盈回看根数(找下跌前的顶/密集区)
  min_rr: 1.5              # 预期盈亏比低于此值不进场
  btc_filter: true         # BTC大盘方向过滤(下跌不做多/上涨不做空)

# ---- 币种筛选 ----
universe:
  quote: USDT                  # 只监控 U 本位永续
  min_quote_volume_24h: 50000000   # 24h成交额低于5000万U的币不监控
  refresh_minutes: 60          # 每小时刷新一次币种列表
  exclude: []                  # 手动排除的币种

# ---- 信号规则 ----
signal:
  fractal_lookback: 3          # 分型确认所需K线数(包含处理后)
  vol_ma_period: 20            # 量能均线周期
  vol_multiplier: 1.5          # 分型最低K量能 >= 1.5x 均量才有效
  vol_strong: 2.0              # >= 2.0x 标记为强信号
  break_reclaim_lookback: 30   # 跌破收回: 在最近30根K里找被跌破的前低
  sl_buffer_pct: 0.3           # 止损=前低下方0.3%
  tp_vp_lookback: 200          # 止盈: 用最近200根K做Volume Profile找上方密集成交区
  tp_vp_bins: 50               # Volume Profile 桶数
  min_rr_primary: 5.0          # 主信号盈亏比门槛(推送TG)
  min_rr_secondary: 2.5        # 次级信号门槛(只入库统计,用于对比验证)
  trend_filter: true           # 1h EMA50 趋势过滤(只做顺势)
  trend_ema_period: 50
  cooldown_bars: 10            # 同币种同级别触发后10根K内不重复提醒
  signal_ttl_bars: 3           # 信号3根K内未确认则过期

# ---- 因子打分（基础规则之上的加分项，明细入库便于统计各因子胜率贡献）----
factors:
  min_score: 1                 # 因子总分达到该值才出信号（0=只记录不拦截）
  rsi_period: 14
  refresh_funding_minutes: 5
  atr_period: 14
  sl_atr_min: 0.5              # 止损距离下限(xATR) 硬过滤
  sl_atr_max: 3.0              # 止损距离上限(xATR) 硬过滤
  rsi_divergence: { enabled: true }                          # +2 RSI背离
  rsi_extreme: { enabled: true, oversold: 30, overbought: 70 }  # +1 RSI极值
  wick_rejection: { enabled: true, min_ratio: 0.5 }          # +1 极值K影线拒绝
  taker_ratio: { enabled: true, min_ratio: 0.58 }            # +1 确认K主动盘占比
  funding: { enabled: true, extreme: 0.0005 }                # +1 资金费率极值(0.05%)
  mtf_resonance: { enabled: true }                           # +1 5m与15m共振
  btc_resonance: { enabled: true }                           # +1 BTC大盘共振

# ---- 逼空检测(P5a) ----
squeeze:
  refresh_minutes: 15      # 每N分钟扫一次衍生数据
  oi_surge_pct: 30.0       # 持仓量2-3h涨幅≥N% = 骤增
  funding_extreme: 0.0005  # 资金费率绝对值≥(0.05%)算极值
  low_pos: 0.35            # 价格处于近200根区间下35%以内 = 低位

# ---- 仓位与风控 ----
risk:
  account_equity: 1000         # 账户规模(USDT), paper模式的虚拟本金
  risk_pct: 0.5                # 单笔风险=账户的0.5%
  max_positions: 5             # 最大同时持仓数
  max_margin_pct: 50           # 总保证金占用上限%
  leverage: 5                  # 默认杠杆
  tiered_tp: false             # 分批止盈(1.5R平1/3, 3R平1/3, 余下移动止损)

# ---- Web ----
web:
  host: 0.0.0.0
  port: 8488
  username: admin
  # 首次启动若 users 表为空, 用这个初始密码创建账号(登录后请修改)
  initial_password: "trade@2026"
  session_hours: 72

# ---- 数据 ----
data:
  db_path: data/trade.db
  backfill_bars: 500           # 启动时每币每级别回填500根K
  kline_keep_bars: 1500        # 每币每级别最多保留1500根(自动清理)

# ---- Telegram ----
telegram:
  enabled: true
  poll_timeout: 25             # long polling 超时(秒)
  confirm_ttl_minutes: 30      # 确认按钮有效期

# ---- 币安 ----
binance:
  rest_base: https://fapi.binance.com
  ws_base: wss://fstream.binance.com
  testnet: false
  recv_window: 5000
