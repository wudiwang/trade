<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>登录 · 缠论交易系统</title>
<link rel="stylesheet" href="/style.css?v=27">
</head>
<body class="login-body">
<div class="login-box">
  <h1>📈 缠论交易系统</h1>
  <p class="muted">币安 USDT 合约 · 分型信号引擎</p>
  <input id="u" placeholder="用户名" autocomplete="username">
  <input id="p" type="password" placeholder="密码" autocomplete="current-password">
  <button id="btn" onclick="doLogin()">登 录</button>
  <p id="err" class="err"></p>
</div>
<script>
async function doLogin() {
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '登录中…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: u.value.trim(), password: p.value})
    });
    if (r.ok) { location.replace('/'); return; }
    err.textContent = (await r.json()).error || '登录失败';
  } catch (e) {
    err.textContent = '网络错误: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}
document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
