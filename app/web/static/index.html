<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>缠论交易系统</title>
<link rel="stylesheet" href="/style.css">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<header>
  <h1>📈 缠论交易系统</h1>
  <span class="pill" id="st-mode">…</span>
  <span class="pill" id="st-symbols">…</span>
  <span class="pill" id="st-ws">…</span>
  <span class="pill" id="st-uptime">…</span>
  <div class="right">
    <button onclick="logout()">退出</button>
  </div>
</header>
<main>
  <div class="cards" id="stat-cards"></div>

  <div class="panel">
    <h2>📡 实时信号
      <span class="tools">
        <select id="f-kind" onchange="loadSignals()">
          <option value="">全部</option>
          <option value="primary">主信号(RR≥5)</option>
          <option value="secondary">次级(RR≥2.5)</option>
        </select>
      </span>
    </h2>
    <table>
      <thead><tr><th>#</th><th>时间</th><th>币种</th><th>级别</th><th>方向</th><th>类型</th>
        <th>入场</th><th>止损</th><th>止盈</th><th>RR</th><th>量能</th><th>状态</th></tr></thead>
      <tbody id="t-signals"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>📐 级别准确率对比 <span class="tools"><span class="muted">同一策略在不同K线级别的表现</span></span></h2>
    <table>
      <thead><tr><th>级别</th><th>总单</th><th>持仓中</th><th>已平仓</th><th>胜率</th><th>总盈亏(U)</th><th>平均R</th></tr></thead>
      <tbody id="t-tfstats"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>💼 模拟交易
      <span class="tools">
        <select id="f-track" onchange="loadTrades()">
          <option value="watch">⚡观察轨(50+分)</option>
          <option value="buy1">✅一买轨(吞没)</option>
          <option value="buy2">🔁二买轨(回测)</option>
          <option value="spring">💎弹簧轨(假破收回)</option>
        </select>
      </span>
    </h2>
    <table>
      <thead><tr><th>#</th><th>币种</th><th>级别</th><th>方向</th><th>入场</th><th>止损</th><th>止盈</th>
        <th>结果</th><th>盈亏(U)</th><th>R</th><th>开仓时间</th></tr></thead>
      <tbody id="t-trades"></tbody>
    </table>
  </div>

  <div class="panel">
    <h2>📉 权益曲线 <span class="tools"><span class="muted" id="eq-note"></span></span></h2>
    <div id="equity-chart" style="height:220px"></div>
  </div>

  <div class="panel">
    <h2>⚙️ 参数配置 <span class="tools"><button class="btn" onclick="saveSettings()">保存并热生效</button></span></h2>
    <div class="settings-grid" id="settings"></div>
  </div>
</main>

<div class="modal-bg" id="modal">
  <div class="modal">
    <span class="close" onclick="closeModal()">✕</span>
    <h3 id="m-title">K线</h3>
    <div id="chart"></div>
  </div>
</div>
<div id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
